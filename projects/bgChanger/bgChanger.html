<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background color changer</title>
    <link rel="stylesheet" href="index.css">
    
 
</head>
<body>
    <div id="container">
        <div><h1>Color Scheme Switcher</h1></div>
        <div id="boxes">
            <div class="colorBox" id="aqua" style="background-color: aqua;"></div>
            <div class="colorBox" id="blueviolet" style="background-color: blueviolet;"></div>
            <div class="colorBox" id='brown' style="background-color: brown ;"></div>
            <div class="colorBox" id="yellowgreen" style="background-color: yellowgreen;"></div>
        </div>
        <div>
            <h2>Try clicking on one of the colors above<br>
            to change the background color of this page!
            </h2>
        </div>
    </div>
    <!-- <script src="index.js" ></script> -->
</body>
<script src="index.js"></script>
</html>
