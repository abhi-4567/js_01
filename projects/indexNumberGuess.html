<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #797978; text-align: center;">
    <div>
        <div style="background-color: black; color:white; font-size:40px">
            NUMBER GUESSING GAME
        </div>
        <div>
            <p style="font-size:25px;">
                Try and guess a random number between 1 and 100.<br><br>
                You have 10 attempts to guess the right number.
            </p>
            <br>
            <h1 style="font-size: 35px;">Guess a number</h1>
            <br>
            <div>
                <form id="form">
                    <label for="num">Number</label>
                    <input id="num" type="number">
                    
                    <button id="sub" type="submit">submit</button>
                </form>
                <br><br>
                <div>
                    <span id="result"></span>
                    <div  id="prevGuess" style="font-size: 20px;">previous guesses:</div><br>
                    <div id="guessRem" style="font-size: 20px;">guess remaining:10</div><br><br>
                    <div id="newBeg"></div>
                </div>
                
            </div>
        </div>
    </div>
</body>
<script>
    let cnt = 10
    const  randomNum = Math.floor(Math.random()*100 +  1)
    const inputNum = document.getElementById('num')
    const form = document.getElementById('form')
    const result = document.getElementById('result')
    const prevGuess =document.getElementById('prevGuess')
    const guessRem = document.getElementById('guessRem')
    const sub=document.getElementById('sub')


    form.addEventListener('submit', (e)=>{
        e.preventDefault()
        if(inputNum.value === '' || inputNum.value < 0|| inputNum.value >100 || isNaN(inputNum.value)){
            result.innerHTML = `please enter a valid number not ${inputNum.value}`
        }else if(parseInt(inputNum.value) === randomNum) {
            result.innerHTML = `you guessed it right ${inputNum.value}`
        } else{
            cnt--
            prevGuess.innerHTML +=`  ${inputNum.value}`
            guessRem.innerHTML = `guess remaining : ${cnt}`
            if(cnt === 0){
                inputNum.setAttribute('disabled','')
                sub.setAttribute('disabled','')
                const startGame = document.createElement('button')
                startGame.innerHTML = 'START NEW GAME'
                document.getElementById('newBeg').appendChild(startGame)
                startGame.addEventListener('click',()=>{
                    prevGuess.innerHTML= 'previous guesses :'
                    guessRem.innerHTML='guess remainig : 10'
                    result.innerHTML=''
                    inputNum.removeAttribute('disabled')
                    sub.removeAttribute('disabled')
                })
                
            }
        }
        inputNum.value=''
    })
</script>
</html>
