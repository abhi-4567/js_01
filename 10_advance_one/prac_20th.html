function walkTheDog(){
    return new Promise((resolve,reject)=>{
        let taskDog = true
        if(taskDog){
            setTimeout(()=>{
                resolve('walked the dog')
        
            },1000)
        }else{
            reject('error in taskDog')
        }
    })
}
function cleanTheKitchen(){
    return new Promise((resolve,reject)=>{
        let taskKitchen=true
        if(taskKitchen){
            setTimeout(()=>{
                resolve('cleaned the kitchen ')
            },1500)
        }else{
            reject('error in taskKitchen')
        }
    })
}
function takeTheTrash(){

                resolve('taken out the trash')
        
            },500)
        }else{
            reject('error in task 3')
        }
    })
}
